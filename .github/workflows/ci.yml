name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...
      # Daemon y CLI son Go puro: se compilan cruzado sin CGO para los tres SO.
      # La app nativa (cmd/unmess-app) va tras la etiqueta de build `gui`; sin
      # ella se compila el stub, así que estas compilaciones cruzadas no
      # necesitan las librerías de WebView de cada plataforma.
      - name: Cross-compile daemon/CLI (windows, macos, linux)
        run: |
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build ./...
          GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build ./...
          GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build ./...
          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build ./...

  # Compila la app nativa (Wails v3, CGO) en Linux con GTK3/WebKit2GTK-4.1.
  gui-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Instalar dependencias de WebView/bandeja (GTK3)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev
      - name: Build unmess-app (gui, gtk3)
        run: go build -tags "gui gtk3" -o dist/unmess-app ./cmd/unmess-app
      - name: Build daemon y CLI
        run: |
          go build -o dist/unmessd ./cmd/unmessd
          go build -o dist/unmess ./cmd/unmess
      - uses: actions/upload-artifact@v4
        with:
          name: unmessai-linux-amd64
          path: dist/
