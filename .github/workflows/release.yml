name: Release (producto)

# Publica binarios al taggear vX.Y.Z.
# También se puede lanzar a mano desde Actions.
#
# Secrets:  SSH_HOST, SSH_USER, SSH_KEY
# Variables: SSH_PORT (def. 22), DOWNLOADS_PATH
#
# Estructura: `build` (ubuntu) compila todo — la app nativa de Windows
# cross-compila desde Linux porque Wails v3 no necesita CGO en Windows
# (WebView2 vía syscalls); la de Linux necesita GTK3/WebKitGTK; la de macOS
# requiere compilar en macOS y NO va en los tar.gz (ver packaging/macos).
# `installer-windows` compila el instalador Inno Setup en un runner Windows
# (iscc viene preinstalado). `publish` junta artefactos y publica.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  SSH_PORT: ${{ vars.SSH_PORT || '22' }}
  VERSION: ${{ github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Instalar dependencias de sistema (GTK3/WebKit2GTK para la app Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev appstream

      - name: Embeber icono y manifiesto en unmess-app.exe (go-winres)
        run: |
          go install github.com/tc-hib/go-winres@latest
          VER="${VERSION#v}"
          (cd cmd/unmess-app && go-winres make --file-version "$VER" --product-version "$VER")

      - name: Compilar binarios
        run: |
          VER="${VERSION#v}"
          LDF="-s -w -X main.version=$VER"
          mkdir -p dist/linux-amd64 dist/darwin-arm64 dist/darwin-amd64 dist/windows-amd64

          # Daemon y CLI: Go puro, cross-compile sin CGO.
          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="$LDF" -o dist/linux-amd64/   ./cmd/unmessd ./cmd/unmess
          GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags="$LDF" -o dist/darwin-arm64/  ./cmd/unmessd ./cmd/unmess
          GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="$LDF" -o dist/darwin-amd64/  ./cmd/unmessd ./cmd/unmess
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="$LDF" -o dist/windows-amd64/ ./cmd/unmessd ./cmd/unmess

          # App nativa Windows: Wails v3 no necesita CGO en Windows, así que
          # cross-compila desde Linux. -H windowsgui evita la consola.
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -tags gui \
            -ldflags="$LDF -H windowsgui" -o dist/windows-amd64/unmess-app.exe ./cmd/unmess-app

          # App nativa Linux (GTK3/WebKitGTK) para el tar.gz portable.
          CGO_ENABLED=1 go build -trimpath -tags "gui gtk3" -ldflags="$LDF" \
            -o dist/linux-amd64/unmess-app ./cmd/unmess-app

      - name: Empaquetar binarios
        run: |
          cd dist
          # macOS: solo daemon + CLI (la app nativa requiere compilar en macOS;
          # ver packaging/macos). Nada de incluir el stub sin GUI.
          tar -czf unmessai-${VERSION}-linux-amd64.tar.gz   -C linux-amd64   .
          tar -czf unmessai-${VERSION}-darwin-arm64.tar.gz  -C darwin-arm64  .
          tar -czf unmessai-${VERSION}-darwin-amd64.tar.gz  -C darwin-amd64  .
          zip  -q  unmessai-${VERSION}-windows-amd64.zip      windows-amd64/*

      - name: Construir .deb
        run: |
          VER="${VERSION#v}"
          bash packaging/linux/build-deb.sh "$VER"

      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            dist/unmessai-*.tar.gz
            dist/unmessai-*.zip
            dist/unmessai_*.deb
          if-no-files-found: error

      # Los .exe sueltos, para que el job del instalador no tenga que recompilar.
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/windows-amd64/*.exe
          if-no-files-found: error

  installer-windows:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: dist/windows-amd64

      - name: Compilar instalador (Inno Setup)
        shell: pwsh
        run: |
          $ver = $env:VERSION.TrimStart('v')
          iscc /DAppVersion=$ver packaging\windows\unmessai.iss

      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/unmessai-setup-*.exe
          if-no-files-found: error

  build-snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: snapcore/action-build@v1
        id: snapcraft
        with:
          snapcraft-channel: stable

      - uses: actions/upload-artifact@v4
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [build, installer-windows, build-snap]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: installer-windows
          path: dist

      - uses: actions/download-artifact@v4
        with:
          name: snap
          path: dist

      - name: Publicar en GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/unmessai-*.tar.gz
            dist/unmessai-*.zip
            dist/unmessai-setup-*.exe
            dist/unmessai_*.deb
            dist/unmessai_*.snap
          generate_release_notes: true

      - name: Publicar en Snap Store
        uses: snapcore/action-publish@v1
        with:
          snap: dist/unmessai_*.snap
          release: stable
          credentials: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      - name: Subir binarios al servidor (descarga alternativa)
        if: ${{ vars.DOWNLOADS_PATH != '' }}
        env:
          HOST: ${{ secrets.SSH_HOST }}
          USER: ${{ secrets.SSH_USER }}
          DEST: ${{ vars.DOWNLOADS_PATH }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${SSH_PORT}" "$HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH="ssh -i ~/.ssh/id_deploy -p ${SSH_PORT} -o StrictHostKeyChecking=accept-new"
          $SSH "$USER@$HOST" "mkdir -p $DEST"
          rsync -az -e "$SSH" dist/unmessai-*.tar.gz dist/unmessai-*.zip dist/unmessai-setup-*.exe dist/unmessai_*.deb dist/unmessai_*.snap "$USER@$HOST:$DEST/"
