[tools]
go = "1.24"
node = "26"
pnpm = "10.33.4"
starship = "latest"

[settings]
experimental = true

[tasks.build-dev-deb]
description = "Build local dev .deb (unmessai-dev, port 48222, no collision with production)"
run = "bash packaging/linux/build-deb-local.sh"
depends = []

[tasks.clean-dev]
description = "Stop dev daemon, remove systemd unit, purge package (keeps config and store)"
run = "bash packaging/linux/clean-dev.sh"

[tasks.clean-dev-hard]
description = "Stop dev daemon, remove systemd unit, purge package, delete config and store"
run = "bash packaging/linux/clean-dev.sh --hard"

[tasks.reinstall-dev]
description = "Full dev reinstall: clean-dev-hard + build .deb + install (prompts for sudo)"
run = """
  bash packaging/linux/clean-dev.sh --hard
  bash packaging/linux/build-deb-local.sh
  VERSION=$(cat .version)-dev
  sudo apt install -y "./dist/unmessai-dev_${VERSION}_amd64.deb"
"""

